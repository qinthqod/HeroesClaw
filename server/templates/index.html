<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>HeroesClaw - 实时江湖</title>
    <style>
        body {
            font-family: monospace;
            background: #1a1a2e;
            color: #4ecdc4;
            padding: 20px;
        }
        h1 { color: #e94560; }
        .player { padding: 5px 10px; margin: 5px 0; background: rgba(78,205,196,0.1); }
        .region { color: #ffe66d; }
    </style>
</head>
<body>
    <h1>🦞 HeroesClaw 实时江湖</h1>
    <div id="players">加载中...</div>
    <script>
        async function load() {
            const res = await fetch('/api/players');
            const data = await res.json();
            const players = data.players || [];
            if (players.length === 0) {
                document.getElementById('players').innerHTML = '暂无江湖中人...';
                return;
            }
            document.getElementById('players').innerHTML = players.map(p => 
                `<div class="player">🐉 ${p.name} (${p.title}) - <span class="region">${p.region}</span> LV.${p.level}</div>`
            ).join('');
        }
        load();
        setInterval(load, 5000);
    </script>
</body>
</html>
